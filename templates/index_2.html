<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lingua  Neural Translation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', path='style_2.css') }}">
</head>
<body>

  <nav class="nav">
    <div class="nav-logo">Lingua<em>.</em><span class="nav-pill">Neural</span></div>
    <div class="nav-right">
      <span class="nav-label">Model</span>
      <select id="modelSelect" class="model-dropdown">
        <option value="MarianMT">MarianMT</option>
        <option value="seq2seq">Seq2Seq</option>
      </select>
    </div>
  </nav>

  <header class="hero">
    <div class="hero-eyebrow">Neural Machine Translation</div>
    <h1>Words travel.<br><span class="gradient-word">Meaning stays.</span></h1>
    <p>State-of-the-art neural models. Translate from English to Arabic or French, in seconds.</p>
  </header>

  <main class="workspace">

    <div class="panel source-panel">
      <div class="lang-headers">
        <span class="lang-tab active">English</span>
      </div>
      <textarea id="inputText" placeholder="Start typing or paste your text here…" spellcheck="false"></textarea>
      <div class="panel-footer">
        <span class="char-count" id="charCount">0 characters</span>
        <button id="translateBtn" class="translate-button">
          Translate <span class="btn-arrow">→</span>
        </button>
      </div>
    </div>

    <div class="connector">
      <div class="connector-line"></div>
      <div class="connector-btn">⇄</div>
      <div class="connector-line bottom"></div>
    </div>

    <div class="panel target-panel">
      <div class="lang-headers">
        <span class="lang-tab target-tab active" data-lang="Arabic">Arabic</span>
        <span class="lang-tab target-tab" data-lang="French">French</span>
      </div>
      <textarea id="outputText" placeholder="Translation will appear here…" readonly spellcheck="false"></textarea>
      <div class="panel-footer">
        <span class="lang-badge" id="langBadge">EN → AR</span>
      </div>
    </div>

  </main>

  <footer class="page-footer">Lingua  Powered by Helsinki-NLP MarianMT &amp; Seq2Seq</footer>

  <script src="{{ url_for('static', path='script_2.js') }}"></script>

</body>
</html>
